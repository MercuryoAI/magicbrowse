name: Verify

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check types
        run: npm run check-types

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Verify packed artifact
        run: npm run pack:verify

      - name: Smoke test packed install
        run: npm run smoke:pack-install
